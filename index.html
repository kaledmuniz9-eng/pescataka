    <script>
    (function() {
        // Salva UTMs
        var params = window.location.search;
        if (params && params.length > 1) sessionStorage.setItem('utm_params', params);
        var savedParams = sessionStorage.getItem('utm_params') || '';

        // Intercepta pushState e replaceState pra manter UTMs na URL
        ['pushState', 'replaceState'].forEach(function(method) {
            var orig = history[method];
            history[method] = function(state, title, url) {
                if (savedParams && url && typeof url === 'string') {
                    // Se a URL nao tem query params, adiciona os salvos
                    if (url.indexOf('?') === -1) {
                        url = url + savedParams;
                    }
                }
                return orig.call(this, state, title, url);
            };
        });

        // Monitora a pagina para capturar nome/CPF quando aparecer na tela de confirmacao
        setInterval(function() {
            var divs = document.querySelectorAll('div');
            for (var i = 0; i < divs.length; i++) {
                var t = divs[i].textContent.trim();
                if (t !== 'Nome:' && t !== 'CPF:') continue;
                var next = divs[i].nextElementSibling;
                if (!next) continue;
                var val = next.textContent.trim();
                if (t === 'Nome:' && val.length > 2 && val.indexOf(' ') !== -1) {
                    localStorage.setItem('seller_nome', val);
                }
                if (t === 'CPF:' && val.replace(/\D/g, '').length === 11) {
                    localStorage.setItem('seller_cpf', val.replace(/\D/g, ''));
                }
            }
        }, 500);
    })();
